<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04091e"/>
      <stop offset="100%" stop-color="#031a60"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#299f4d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#299f4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#5b8af5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5b8af5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow2)"/>

  <!-- House body -->
  <rect x="154" y="268" width="204" height="150" rx="16" fill="white" opacity="0.93"/>

  <!-- Roof -->
  <polygon points="256,116 370,256 142,256" fill="#299f4d"/>
  <!-- Roof sheen -->
  <polygon points="256,116 320,200 256,200" fill="white" opacity="0.1"/>

  <!-- Door -->
  <rect x="218" y="330" width="76" height="88" rx="38" fill="#031a60" opacity="0.88"/>

  <!-- Left window -->
  <rect x="166" y="288" width="40" height="36" rx="6" fill="#031a60" opacity="0.4"/>
  <!-- Right window -->
  <rect x="306" y="288" width="40" height="36" rx="6" fill="#031a60" opacity="0.4"/>

  <!-- Chimney -->
  <rect x="300" y="148" width="32" height="76" rx="8" fill="#299f4d" opacity="0.7"/>

  <!-- Green badge top-right -->
  <circle cx="402" cy="112" r="28" fill="#299f4d"/>
  <path d="M390 112 L400 122 L416 102"
        stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
