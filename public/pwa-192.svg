<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04091e"/>
      <stop offset="100%" stop-color="#031a60"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#299f4d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#299f4d" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="192" height="192" rx="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <rect width="192" height="192" rx="40" fill="url(#glow)"/>

  <!-- House body -->
  <rect x="58" y="100" width="76" height="56" rx="6" fill="white" opacity="0.92"/>

  <!-- Roof -->
  <polygon points="96,44 138,96 54,96" fill="#299f4d"/>
  <!-- Roof highlight -->
  <polygon points="96,44 120,75 96,75" fill="white" opacity="0.12"/>

  <!-- Door -->
  <rect x="82" y="124" width="28" height="32" rx="14" fill="#031a60" opacity="0.85"/>

  <!-- Chimney -->
  <rect x="112" y="56" width="12" height="28" rx="3" fill="#299f4d" opacity="0.75"/>

  <!-- Green accent dot -->
  <circle cx="150" cy="42" r="10" fill="#299f4d"/>
  <path d="M145 42 L149 46 L155 38" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
