<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 2532" width="1170" height="2532">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#04091e"/>
      <stop offset="60%" stop-color="#031a60"/>
      <stop offset="100%" stop-color="#0a2580"/>
    </linearGradient>
    <radialGradient id="orb1" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#299f4d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#299f4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="20%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#5b8af5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5b8af5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1170" height="2532" fill="url(#bg)"/>
  <rect width="1170" height="2532" fill="url(#orb1)"/>
  <rect width="1170" height="2532" fill="url(#orb2)"/>

  <!-- Centered icon -->
  <!-- House body -->
  <rect x="471" y="1164" width="228" height="168" rx="18" fill="white" opacity="0.93"/>
  <!-- Roof -->
  <polygon points="585,1020 709,1160 461,1160" fill="#299f4d"/>
  <!-- Door -->
  <rect x="543" y="1248" width="84" height="84" rx="42" fill="#031a60" opacity="0.88"/>
  <!-- Chimney -->
  <rect x="649" y="1072" width="34" height="76" rx="8" fill="#299f4d" opacity="0.7"/>
  <!-- Green check badge -->
  <circle cx="693" cy="1046" r="28" fill="#299f4d"/>
  <path d="M681 1046 L691 1056 L707 1036"
        stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- App name -->
  <text x="585" y="1420"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
        font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    LandLord
  </text>

  <!-- Tagline -->
  <text x="585" y="1490"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
        font-size="32" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    Rent Transactions
  </text>

  <!-- Bottom pill -->
  <rect x="460" y="1540" width="250" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
</svg>
